name: Flutter APK Release

on:
  push:
    tags:
      - "flutter-v*"

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: milk_tea_flutter
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: milk_tea_flutter
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: milk_tea_flutter
        run: flutter test

      - name: Build release APK
        working-directory: milk_tea_flutter
        run: flutter build apk --release

      - name: Prepare APK asset
        run: |
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#flutter-v}"
          cp milk_tea_flutter/build/app/outputs/flutter-apk/app-release.apk "release-assets/MilkTea-Flutter-v${VERSION}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Milk Tea Flutter ${{ github.ref_name }}"
          body: |
            Flutter APK release for the Milk Tea Shop mobile app.

            Included features:
            - Login and registration with show/hide password controls
            - Customer menu, product search, customization, cart, and checkout
            - Customer order list and order details
            - Admin dashboard, orders, payment status updates, products, add-ons, and sizes

            Demo accounts:
            - Customer: customer@example.com / password
            - Admin: admin@milktea.test / password123
          files: release-assets/*.apk
